  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden Netlify form for build-time detection -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" style="display:none">
      <input type="hidden" name="form-name" value="contact" />
      <p>
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>
      <p><input name="firstName" /></p>
      <p><input name="lastName" /></p>
      <p><input name="email" /></p>
      <p><input name="company" /></p>
      <p><input name="phone" /></p>
      <p><textarea name="challenges"></textarea></p>
    </form>
